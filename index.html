<script>
(function () {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const day = today.getDate();

  const MONTHS = [
    'January','February','March','April','May','June',
    'July','August','September','October','November','December'
  ];
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const DAYS_S = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let startDay, endDay;
  if (day <= 15) {
    startDay = 1;
    endDay = 15;
  } else {
    startDay = 16;
    endDay = new Date(year, month + 1, 0).getDate();
  }

  const monthName = MONTHS[month];
  const label = `${monthName} ${startDay}–${endDay}, ${year}`;

  document.getElementById('hdrPeriod').textContent = label;
  document.getElementById('periodDisplay').textContent = label;
  document.getElementById('tableHeading').textContent = `Daily Hours — ${label}`;

  const tbody = document.getElementById('tsBody');

  function fmtN(v) {
    const num = Number(v) || 0;
    return Number.isInteger(num) ? String(num) : num.toFixed(1);
  }

  function getRowHours(d) {
    const locEl = document.getElementById(`loc-${d}`);
    const hrsEl = document.getElementById(`hrs-${d}`);
    const cusEl = document.getElementById(`cus-${d}`);

    if (!locEl || !hrsEl || !cusEl) return 0;

    const loc = locEl.value;
    if (loc === 'Off') return 0;

    const hrsVal = hrsEl.value;

    if (hrsVal === 'custom') {
      const customVal = parseFloat(cusEl.value);
      return Number.isNaN(customVal) ? 0 : customVal;
    }

    const normalVal = parseFloat(hrsVal);
    return Number.isNaN(normalVal) ? 0 : normalVal;
  }

  function updateRowState(d) {
    const row = document.getElementById(`row-${d}`);
    const locEl = document.getElementById(`loc-${d}`);
    const hrsEl = document.getElementById(`hrs-${d}`);
    const cusEl = document.getElementById(`cus-${d}`);
    const rowHrs = document.getElementById(`rh-${d}`);

    const loc = locEl.value;
    const hrsVal = hrsEl.value;

    if (loc === 'Off') {
      row.classList.add('row-off');
      hrsEl.disabled = true;
      cusEl.style.display = 'none';
      cusEl.disabled = true;
      rowHrs.textContent = '—';
      rowHrs.className = 'row-hrs off';
      return;
    }

    row.classList.remove('row-off');
    hrsEl.disabled = false;

    if (hrsVal === 'custom') {
      cusEl.style.display = 'inline-block';
      cusEl.disabled = false;
    } else {
      cusEl.style.display = 'none';
      cusEl.disabled = true;
    }

    const hrs = getRowHours(d);
    rowHrs.textContent = fmtN(hrs);
    rowHrs.className = hrs > 0 ? 'row-hrs has' : 'row-hrs off';
  }

  function recalc() {
    let g1 = 0;
    let g2 = 0;
    let g3 = 0;

    for (let d = startDay; d <= endDay; d++) {
      updateRowState(d);

      const loc = document.getElementById(`loc-${d}`).value;
      const hrs = getRowHours(d);

      if (loc === 'G1') g1 += hrs;
      if (loc === 'G2') g2 += hrs;
      if (loc === 'G3') g3 += hrs;
    }

    document.getElementById('totG1').textContent = fmtN(g1);
    document.getElementById('totG2').textContent = fmtN(g2);
    document.getElementById('totG3').textContent = fmtN(g3);
    document.getElementById('totAll').textContent = fmtN(g1 + g2 + g3);
  }

  for (let d = startDay; d <= endDay; d++) {
    const dt = new Date(year, month, d);
    const dowFull = DAYS[dt.getDay()];
    const mmdd = `${monthName.slice(0, 3)} ${d}`;

    const tr = document.createElement('tr');
    tr.id = `row-${d}`;

    tr.innerHTML = `
      <td data-label="Date">
        <div class="date-main">${mmdd}</div>
        <div class="date-wday">${dowFull}</div>
      </td>
      <td data-label="Store">
        <div class="sel-wrap">
          <select id="loc-${d}" class="loc-select">
            <option value="Off" selected>Off</option>
            <option value="G1">G1</option>
            <option value="G2">G2</option>
            <option value="G3">G3</option>
          </select>
        </div>
      </td>
      <td data-label="Hours">
        <div class="hrs-cell">
          <div class="sel-wrap">
            <select id="hrs-${d}" class="hrs-select">
              <option value="9.5">9.5 hrs</option>
              <option value="10">10 hrs</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          <input
            type="number"
            id="cus-${d}"
            class="custom-inp"
            min="0"
            max="24"
            step="0.5"
            placeholder="hrs"
          />
        </div>
      </td>
      <td class="row-hrs off" id="rh-${d}" data-label="Hrs">—</td>
    `;

    tbody.appendChild(tr);
  }

  for (let d = startDay; d <= endDay; d++) {
    const locEl = document.getElementById(`loc-${d}`);
    const hrsEl = document.getElementById(`hrs-${d}`);
    const cusEl = document.getElementById(`cus-${d}`);

    locEl.addEventListener('change', recalc);
    hrsEl.addEventListener('change', recalc);
    cusEl.addEventListener('input', recalc);
  }

  recalc();

  window.doSubmit = function () {
    const nameEl = document.getElementById('empName');
    const name = nameEl.value.trim();

    if (!name) {
      nameEl.classList.add('err');
      document.getElementById('empErr').classList.add('on');
      nameEl.focus();
      return;
    }

    nameEl.classList.remove('err');
    document.getElementById('empErr').classList.remove('on');

    const total = parseFloat(document.getElementById('totAll').textContent) || 0;
    if (total === 0) {
      alert('Please enter hours for at least one day before submitting.');
      return;
    }

    document.getElementById('sEmp').textContent = name;
    document.getElementById('sPeriod').textContent = label;
    document.getElementById('sDate').textContent =
      new Date().toLocaleString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric',
        hour: 'numeric',
        minute: '2-digit'
      });

    document.getElementById('sG1').textContent = document.getElementById('totG1').textContent;
    document.getElementById('sG2').textContent = document.getElementById('totG2').textContent;
    document.getElementById('sG3').textContent = document.getElementById('totG3').textContent;
    document.getElementById('sAll').textContent = document.getElementById('totAll').textContent;

    const LOCBADGE = {
      G1: '<span class="loc-badge badge-g1">G1</span>',
      G2: '<span class="loc-badge badge-g2">G2</span>',
      G3: '<span class="loc-badge badge-g3">G3</span>',
      Off: '<span class="loc-badge badge-off">Off</span>'
    };

    const stBody = document.getElementById('sTableBody');
    stBody.innerHTML = '';

    for (let d = startDay; d <= endDay; d++) {
      const dt = new Date(year, month, d);
      const loc = document.getElementById(`loc-${d}`).value;
      const hrs = getRowHours(d);
      const isOff = loc === 'Off';

      const tr = document.createElement('tr');
      if (isOff) tr.className = 'srow-off';

      tr.innerHTML = `
        <td>${monthName.slice(0, 3)} ${d}, ${year}</td>
        <td>${DAYS_S[dt.getDay()]}</td>
        <td>${LOCBADGE[loc] || loc}</td>
        <td style="text-align:right;font-weight:600;">${isOff ? '—' : `${fmtN(hrs)} hrs`}</td>
      `;

      stBody.appendChild(tr);
    }

    const sec = document.getElementById('summarySection');
    sec.style.display = 'block';
    sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  window.copyText = function () {
    const name = document.getElementById('sEmp').textContent;
    const period = document.getElementById('sPeriod').textContent;
    const g1v = document.getElementById('sG1').textContent;
    const g2v = document.getElementById('sG2').textContent;
    const g3v = document.getElementById('sG3').textContent;
    const allv = document.getElementById('sAll').textContent;

    const lines = [
      'iFixandRepair — Employee Timesheet',
      '========================================',
      `Employee:   ${name}`,
      `Pay Period: ${period}`,
      '',
      `G1 Total:   ${g1v} hrs`,
      `G2 Total:   ${g2v} hrs`,
      `G3 Total:   ${g3v} hrs`,
      `TOTAL:      ${allv} hrs`,
      '',
      'Daily Breakdown:',
      '----------------'
    ];

    const rows = document.querySelectorAll('#sTableBody tr');
    rows.forEach((r) => {
      const cells = r.querySelectorAll('td');
      const date = cells[0]?.textContent.trim() || '';
      const dayTxt = cells[1]?.textContent.trim() || '';
      const loc = cells[2]?.textContent.trim() || '';
      const hrs = cells[3]?.textContent.trim() || '';
      lines.push(`${date}  ${dayTxt}  |  ${loc}  |  ${hrs}`);
    });

    const txt = lines.join('\n');

    navigator.clipboard.writeText(txt).then(() => {
      const btn = document.getElementById('copyBtnTxt');
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy Text'; }, 2000);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = txt;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);

      const btn = document.getElementById('copyBtnTxt');
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy Text'; }, 2000);
    });
  };
})();
</script>
